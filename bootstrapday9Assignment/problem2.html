<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row g-4">
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100">
                <img src="laptopimg.jpg" class="card-img-top" alt="Product">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Laptop</h5>
                    <p class="card-text">₹50,000</p>
                    <div class="mt-auto">
                        <button class="btn btn-primary btn-sm">Add to Cart</button>
                        <button class="btn btn-secondary btn-sm">View Details</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100">
                <img src="smartphoneimg.jpg" class="card-img-top" alt="Product">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Smartphone</h5>
                    <p class="card-text">₹20,000</p>
                    <div class="mt-auto">
                        <button class="btn btn-primary btn-sm">Add to Cart</button>
                        <button class="btn btn-secondary btn-sm">View Details</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100">
                <img src="headphoneimg.avif" class="card-img-top" alt="Product">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Headphones</h5>
                    <p class="card-text">₹3,000</p>
                    <div class="mt-auto">
                        <button class="btn btn-primary btn-sm">Add to Cart</button>
                        <button class="btn btn-secondary btn-sm">View Details</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6 col-lg-3">
            <div class="card h-100">
                <img src="smartwatchimg.avif" class="card-img-top" alt="Product">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">Smart Watch</h5>
                    <p class="card-text">₹5,000</p>
                    <div class="mt-auto">
                        <button class="btn btn-primary btn-sm">Add to Cart</button>
                        <button class="btn btn-secondary btn-sm">View Details</button>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
