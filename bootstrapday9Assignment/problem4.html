<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">E-Shop</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="offcanvas offcanvas-end" id="menu">
            <div class="offcanvas-header">
                <h5 class="offcanvas-title">Menu</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                </ul>
            </div>
        </div>
    </div>
</nav>

<section class="text-center py-5 bg-white">
    <div class="container">
        <h1>Welcome to E-Shop</h1>
        <p>Best Electronics at Best Price</p>
        <button class="btn btn-primary">Shop Now</button>
    </div>
</section>

<div id="carouselExample" class="carousel slide container my-4" data-bs-ride="carousel">
    <div class="carousel-inner">
        <div class="carousel-item active">
            <img src="laptopimg.jpg" class="d-block w-100" alt="Slide 1">
        </div>
        <div class="carousel-item">
            <img src="smartphoneimg.jpg" class="d-block w-100" alt="Slide 2">
        </div>
        <div class="carousel-item">
            <img src="headphoneimg.avif" class="d-block w-100" alt="Slide 3">
        </div>
    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>
</div>
<section class="container py-5">
    <div class="row g-4 text-center">

        <div class="col-12 col-sm-6 col-lg-3">
            <div class="card h-100">
                <img src="laptopimg.jpg" class="card-img-top">
                <div class="card-body">
                    <h5>Laptop</h5>
                    <button class="btn btn-outline-primary btn-sm">Buy</button>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-3">
            <div class="card h-100">
                <img src="smartphoneimg.jpg" class="card-img-top">
                <div class="card-body">
                    <h5>Mobile</h5>
                    <button class="btn btn-outline-primary btn-sm">Buy</button>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-3">
            <div class="card h-100">
                <img src="headphoneimg.avif" class="card-img-top">
                <div class="card-body">
                    <h5>Headphones</h5>
                    <button class="btn btn-outline-primary btn-sm">Buy</button>
                </div>
            </div>
        </div>

        <div class="col-12 col-sm-6 col-lg-3">
            <div class="card h-100">
                <img src="smartwatchimg.avif" class="card-img-top">
                <div class="card-body">
                    <h5>Watch</h5>
                    <button class="btn btn-outline-primary btn-sm">Buy</button>
                </div>
            </div>
        </div>

    </div>
</section>

<section class="bg-dark text-white text-center py-5">
    <div class="container">
        <h4>Subscribe Newsletter</h4>
        <form class="row justify-content-center mt-3">
            <div class="col-12 col-md-6">
                <input type="email" class="form-control mb-3" placeholder="Enter Email">
            </div>
            <div class="col-12 col-md-2">
                <button class="btn btn-light w-100">Subscribe</button>
            </div>
        </form>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
