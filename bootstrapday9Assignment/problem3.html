<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Event Dashboard</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="#">Events</a>
                </li>
                <li class="nav-item">
                    <button class="btn btn-primary btn-sm ms-3" data-bs-toggle="modal" data-bs-target="#eventModal">
                        Add Event
                    </button>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container py-5">
    <div class="row g-4">
        <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">Tech Fest</h5>
                    <p class="card-text">Date: 10 March</p>
                </div>
            </div>
        </div>
        <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">Cultural Night</h5>
                    <p class="card-text">Date: 15 March</p>
                </div>
            </div>
        </div>
        <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">Sports Meet</h5>
                    <p class="card-text">Date: 20 March</p>
                </div>
            </div>
        </div>
        <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">Workshop</h5>
                    <p class="card-text">Date: 25 March</p>
                </div>
            </div>
        </div>

    </div>
</div>
<div class="modal fade" id="eventModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Add New Event</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <form class="needs-validation" novalidate>

                    <div class="mb-3">
                        <label class="form-label">Event Name</label>
                        <input type="text" class="form-control" required>
                        <div class="invalid-feedback">
                            Please enter event name.
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Event Date</label>
                        <input type="date" class="form-control" required>
                        <div class="invalid-feedback">
                            Please select date.
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" required></textarea>
                        <div class="invalid-feedback">
                            Please enter description.
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">Save Event</button>

                </form>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
(() => {
  'use strict'
  const forms = document.querySelectorAll('.needs-validation')
  Array.from(forms).forEach(form => {
    form.addEventListener('submit', event => {
      if (!form.checkValidity()) {
        event.preventDefault()
        event.stopPropagation()
      }
      form.classList.add('was-validated')
    }, false)
  })
})()
</script>
    
</body>
</html>
