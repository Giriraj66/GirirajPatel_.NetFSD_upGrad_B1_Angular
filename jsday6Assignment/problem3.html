<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body onload="loadHistory()">
    
     <h2>Location-Based Weather Logger</h2>

    <button onclick="getLocation()">Get My Location</button>

    <p id="currentLocation"></p>

    <h3>Last 5 Locations</h3>
    <div id="history"></div>

    <script>
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(successCallback, errorCallback);
            } else {
                document.getElementById("currentLocation").innerText = "Geolocation not supported.";
            }
        }

        function successCallback(position) {
            var latitude = position.coords.latitude;
            var longitude = position.coords.longitude;

            document.getElementById("currentLocation").innerText =
                "Latitude: " + latitude + " | Longitude: " + longitude;

            var newLocation = {
                lat: latitude,
                lon: longitude
            };

            var history = localStorage.getItem("locationHistory");
            history = history ? JSON.parse(history) : [];

            history.push(newLocation);

            if (history.length > 5) {
                history.shift();
            }

            localStorage.setItem("locationHistory", JSON.stringify(history));

            displayHistory(history);
        }

        function errorCallback(error) {
            if (error.code === 1) {
                document.getElementById("currentLocation").innerText = "Permission denied.";
            } else if (error.code === 2) {
                document.getElementById("currentLocation").innerText = "Location unavailable.";
            } else if (error.code === 3) {
                document.getElementById("currentLocation").innerText = "Request timeout.";
            }
        }

        function loadHistory() {
            var history = localStorage.getItem("locationHistory");
            history = history ? JSON.parse(history) : [];
            displayHistory(history);
        }

        function displayHistory(history) {
            var historyDiv = document.getElementById("history");
            historyDiv.innerHTML = "";

            for (var i = 0; i < history.length; i++) {
                historyDiv.innerHTML +=
                    "Latitude: " + history[i].lat +
                    " | Longitude: " + history[i].lon + "<br>";
            }
        }
    </script>

</body>
</html>
