<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
     body {
            background-color: lightblue;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        h1 {
            text-align: center;
            font-size: 36px;
        }

        nav {
            background-color: black;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-size: 18px;
        }
        @media screen and (max-width: 600px) {
            body {
                background-color: lightgreen;
            }

           
            h1 {
                font-size: 24px;
            }

            nav a {
                display: block;    
                margin: 10px 0;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
     <h1>Responsive Web Page</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <p style="text-align:center; padding:20px;">
        This page changes layout and design on mobile screens.
    </p>
</body>
</html>
